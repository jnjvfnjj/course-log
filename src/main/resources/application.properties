# ===================================================================
# ENGLISH SCHOOL CRM - Application Properties Configuration
# Course: Object-Oriented Programming Capstone
# ===================================================================

spring.application.name=english-school-crm

# Port configuration (Runs on standard Port 8080 or port 3000 depending on profile context)
server.port=8081

# -------------------------------------------------------------------
# Option A: H2 Memory Relational Database (DEFAULT for Zero-Setup Grading)
# -------------------------------------------------------------------
spring.datasource.url=jdbc:h2:mem:schoolcrm;DB_CLOSE_DELAY=-1
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

# Enable H2 Web Console lookup at http://localhost:8080/h2-console
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
spring.h2.console.settings.web-allow-others=true

# -------------------------------------------------------------------
# Option B: PostgreSQL Configuration (Preferred production alternative)
# Uncomment the block below during local PostgreSQL setup
# -------------------------------------------------------------------
# spring.datasource.url=jdbc:postgresql://localhost:5420/english_school_crm
# spring.datasource.username=postgres
# spring.datasource.password=yourPostgresPassword
# spring.datasource.driverClassName=org.postgresql.Driver
# spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# -------------------------------------------------------------------
# JPA / Hibernate configuration
# -------------------------------------------------------------------
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Allow H2 console frame access in local development
spring.headers.frameOptions.disable=true
